name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 12 * * 1,4'
  workflow_dispatch:

jobs:
  ping-db:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping to Supabase API
        run: |
          curl -s "${{ vars.SUPABASE_URL }}/rest/v1/auth/v1/health" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
